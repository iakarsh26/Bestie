<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bestie Forever 💖</title>

<!-- Confetti CDN -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg, #ffd6f6, #e0ccff, #cce7ff);
    text-align: center;
    overflow: hidden;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: pink;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh) scale(1); opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* Card */
.card {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    margin: 100px auto;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* Text */
h1, p {
    color: #333;
}

/* Buttons */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
    margin: 10px;
}

/* YES button */
#yesBtn {
    background: #ff6fa5;
    color: white;
    animation: bounce 1s infinite alternate;
}

@keyframes bounce {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

/* NO button */
#noBtn {
    background: #aaa;
    color: white;
    position: relative;
}

/* Hidden section */
#result {
    display: none;
}
</style>
</head>

<body>

<!-- Floating Hearts Script -->
<script>
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}, 300);
</script>

<div class="card">

    <!-- Typing Text -->
    <h2 id="typing"></h2>

    <!-- Question -->
    <h1 id="question" style="display:none;">
        Will you be my bestie forever? 🫶
    </h1>

    <!-- GIFS -->
    <div id="gifs" style="display:none;">
        <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="120"><br>
        <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" width="120"><br>
        <img src="https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif" width="120">
    </div>

    <!-- Buttons -->
    <div id="buttons" style="display:none;">
        <button id="yesBtn">YES 💕</button>
        <button id="noBtn">NO 😏</button>
    </div>

    <!-- Result -->
    <div id="result">
        <h1>YAYYYY 💖</h1>
        <p>
            I knew you had no choice 😎<br>
            You're my favorite human 🫶<br>
            Thanks for tolerating my nonsense 😂
        </p>

        <img src="https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif" width="150">

        <p>
            Thanks for being my bestie 🫶<br>
            From stupid jokes to serious talks…<br>
            You make everything better 😌<br>
            Even when we share one brain cell 😂
        </p>
    </div>

</div>

<script>
// Typing animation
const lines = [
"Hey Bestie 💖",
"You are literally stuck with me forever 😌",
"After all the chaos we've done together...",
"So answer this carefully 👀"
];

let i = 0, j = 0;
function type() {
    if (i < lines.length) {
        if (j < lines[i].length) {
            document.getElementById("typing").innerHTML += lines[i].charAt(j);
            j++;
            setTimeout(type, 40);
        } else {
            document.getElementById("typing").innerHTML += "<br>";
            i++; j = 0;
            setTimeout(type, 500);
        }
    } else {
        document.getElementById("question").style.display = "block";
        document.getElementById("buttons").style.display = "block";
        document.getElementById("gifs").style.display = "block";
    }
}
type();

// NO button movement + text
const noTexts = [
"Are you serious?? 😭",
"After everything we've done?? 😤",
"Remember that embarrassing moment 👀",
"You owe me food btw 🍕",
"Wrong answer detected 😎",
"Try again bestie 😂"
];

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    noBtn.innerText = noTexts[Math.floor(Math.random() * noTexts.length)];
});

// YES button
document.getElementById("yesBtn").addEventListener("click", () => {

    // Confetti
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
    });

    document.getElementById("result").style.display = "block";
    document.getElementById("buttons").style.display = "none";
    document.getElementById("question").style.display = "none";
    document.getElementById("gifs").style.display = "none";
});
</script>

</body>
          </html>
